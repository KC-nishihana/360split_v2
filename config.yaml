camera_front:
  # cam1_Checker.xml (Metashape equisolid_fisheye) より
  # cx_abs = 3840/2 + (-1.4843) = 1918.5157, cy_abs = 3840/2 + (-6.9020) = 1913.0980
  K: [[1044.8443011833367, 0, 1918.5156891072001], [0, 1044.8443011833367, 1913.0979523487183], [0, 0, 1]]
  D: [0.11790313119903945, -0.011266103183410984, 0.022976306990932838, -0.010518868987145141]
  image_size: [3840, 3840]
  model: fisheye

camera_back:
  # TODO: cam2のキャリブレーションデータで更新する
  K: [[1044.8443011833367, 0, 1918.5156891072001], [0, 1044.8443011833367, 1913.0979523487183], [0, 0, 1]]
  D: [0.11790313119903945, -0.011266103183410984, 0.022976306990932838, -0.010518868987145141]
  image_size: [3840, 3840]
  model: fisheye

projection:
  directions:
    - {name: front, yaw_deg: 0}
    - {name: left, yaw_deg: -90}
    - {name: right, yaw_deg: 90}
    - {name: back, yaw_deg: 180}
  hfov_deg: 90
  vfov_deg: 90
  output_size: [1600, 1600]

extraction:
  fps: 2.0
  start_sec: 0.0
  end_sec: null
  max_frames: null

selection:
  sfm:
    sharpness_min: 150.0
    exposure_min: 0.4
    orb_min: 100
    ssim_max: 0.92
    per_direction_min: 20
    max_total: null
  gs:
    sharpness_min: 80.0
    exposure_min: 0.3
    orb_min: 50
    ssim_max: 0.96
    per_direction_min: 10
    max_total: null

colmap:
  enabled: false
  binary_path: colmap
  workspace: colmap_workspace
  camera_model: PINHOLE
  use_gpu: false

output_dir: out
project_name: my_project